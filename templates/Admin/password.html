{% extends 'Admin/home_index.html' %}
{% block body %}
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center">Change Password</h2>
                <form  method="post" action="/myapp/changepassword_post/">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="currentpassword">Current Password</label>
                        <input type="text" class="form-control" name="currentpassword" placeholder="Enter your Current Password " required>
                    </div>
                    <div class="form-group">
                        <label for="NewPassword">New Password</label>
                        <input type="text" class="form-control" name="NewPassword" placeholder="Enter your New Password" required>
                    </div>
                    <div class="form-group">
                        <label for="ConfirmPassword">Confirm Password</label>
                        <input type="password" class="form-control" name="ConfirmPassword" placeholder="Enter your Confirm Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Submit</button>
                </form>
{#                <div class="text-center mt-3">#}
{#                    <a href="#">Forgot Password?</a>#}
{#                </div>#}
            </div>
        </div>
    </div>
{% endblock %}
